name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile (MSVC)
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do call "%%i\VC\Auxiliary\Build\vcvars64.bat"
          cl /nologo /O2 /W3 /Fe:mousedancing.exe main.c /link /SUBSYSTEM:WINDOWS user32.lib shell32.lib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mousedancing-win64
          path: mousedancing.exe

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: mousedancing.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
