name: Build Windows

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Versão (tag ou build)
        id: ver
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ($ref -match '^refs/tags/v(.+)$') {
            $v = $Matches[1]
          } else {
            $v = "0.0.${{ github.run_number }}"
          }
          "VERSION=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Compilar aplicação (MSVC)
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do call "%%i\VC\Auxiliary\Build\vcvars64.bat"
          cl /nologo /O2 /W3 /utf-8 /DUNICODE /D_UNICODE /D_WIN32_WINNT=0x0600 /Fe:mousedancing.exe main.c /link /SUBSYSTEM:WINDOWS user32.lib shell32.lib

      - name: Instalar NSIS
        run: choco install nsis -y

      - name: Criar instalador (MouseDancing-Setup.exe)
        shell: cmd
        run: |
          copy /Y mousedancing.exe installer\
          set "PATH=%PATH%;C:\Program Files (x86)\NSIS"
          cd installer
          makensis /DAPP_VERSION=${{ steps.ver.outputs.VERSION }} mousedancing.nsi
          if not exist MouseDancing-Setup.exe exit /b 1
          cd ..

      - name: Artefactos (portátil + instalador)
        uses: actions/upload-artifact@v7
        with:
          name: mousedancing-win64
          path: |
            mousedancing.exe
            installer/MouseDancing-Setup.exe

      # Tag v* (push): cria a release no GitHub e anexa binários.
      # Evento release (UI): anexa à release que acabaste de publicar.
      - name: Publicar ficheiros na GitHub Release
        if: |
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          github.event_name == 'release'
        uses: softprops/action-gh-release@v2.6.1
        with:
          generate_release_notes: true
          files: |
            mousedancing.exe
            installer/MouseDancing-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
